# examples/full.yaml
#
# Every available pulse.yaml option in one place.
# Use this as a reference when writing your own config.
#
# Required fields: run
# Optional fields: build and all others (shown with defaults where applicable)
# If `build` is omitted, the service is treated as a plain process.

version: 1

services:
  api:
    # ── Source location ──────────────────────────────────────────────────────
    # Directory containing the Go package to build.
    # Used as the base path for file watching.
    path: ./cmd/api

    # ── Build command ────────────────────────────────────────────────────────
    # Full shell command to compile the binary.
    # Quoted arguments with spaces are handled correctly:
    #   -ldflags "-X main.Version=dev -X main.Commit=abc" stays as one token.
    build: go build -ldflags "-X main.Version=dev" -tags dev -o ./tmp/api ./cmd/api

    # ── Run command ──────────────────────────────────────────────────────────
    # Command to start the compiled binary. Can include arguments.
    run: ./tmp/api --port 8080 --log-level debug

    # ── File watching ────────────────────────────────────────────────────────
    # Extensions or exact filenames that trigger a rebuild.
    # Default: [".go", "go.mod", "go.sum"]
    watch:
      - .go
      - .templ
      - .html
      - go.mod
      - go.sum
      - config.yaml

    # Additional glob patterns to exclude (applied to the base filename).
    # Hardcoded ignores (.git, vendor, node_modules, tmp, testdata,
    # *_gen.go, *.pb.go) are always active regardless of this list.
    ignore:
      - mock_*.go
      - "*_test.go"

    # ── Environment variables ────────────────────────────────────────────────
    # Injected into the child process on top of the parent environment.
    env:
      PORT: 8080
      DB_URL: postgres://localhost/myapp_dev
      REDIS_ADDR: localhost:6379
      LOG_LEVEL: debug

    # ── Hooks ────────────────────────────────────────────────────────────────
    # pre: command run before each build.
    # pre_strict: if true, pre failure aborts the build; old process kept alive.
    pre: go generate ./...
    pre_strict: false

    # post: command run after a successful build but BEFORE the process is
    # swapped. Because post runs before the swap, it cannot probe the new
    # process's network endpoint — use it for static checks (vet, tests,
    # --check flags) or commands that validate the newly built binary directly.
    # When post_strict is false (default), a failure is logged but the swap
    # still happens. When post_strict is true, a failure keeps the old process
    # alive — symmetric with pre_strict aborting the build.
    post: go vet ./...
    post_strict: false

    # ── Timing ───────────────────────────────────────────────────────────────
    # Quiet period after the last file event before a build fires.
    # Rapid saves within the window are coalesced into one build.
    # Default: 300ms
    debounce: 300ms

    # How long to wait for SIGTERM before escalating to SIGKILL.
    # Increase for services with long graceful shutdown (e.g. connection drain).
    # Default: 5s
    kill_timeout: 5s

    # ── Stdin ────────────────────────────────────────────────────────────────
    # Disable stdin forwarding. Useful in CI or non-interactive environments.
    # Default: false (stdin is forwarded)
    no_stdin: false

    # ── Polling ──────────────────────────────────────────────────────────────
    # Controls the file-watching strategy.
    #   "auto" (default) — inotify normally; switch to polling when a Docker
    #                      container is detected automatically.
    #   "on"             — always poll (use when auto-detection fails).
    #   "off"            — always use inotify, never poll.
    polling: auto

    # Tick rate when polling is active. Default: 500ms.
    poll_interval: 500ms
