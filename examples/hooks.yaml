# examples/hooks.yaml
#
# Pre and post build hooks.
#
# pre  — runs before each build. Non-strict by default: failure is logged
#        but the build proceeds. Set pre_strict: true to abort the build on
#        failure (old process stays alive, same as a compile error).
#
# post — runs after a successful build but BEFORE the process is swapped.
#        Non-strict by default: failure is logged but the swap still happens.
#        Set post_strict: true to abort the swap on failure — the old process
#        stays alive, identical to a build failure. This makes post_strict a
#        true validation gate, symmetric with pre_strict.

version: 1

services:
  # Code generation before build.
  # Non-strict: a template error won't block a Go-only change from rebuilding.
  api-with-templates:
    path: ./cmd/api
    build: go build -o ./tmp/api ./cmd/api
    run: ./tmp/api
    pre: templ generate
    watch:
      - .go
      - .templ

  # Strict code generation: the generated files must be up-to-date before
  # compiling. If go generate fails, the old binary keeps running.
  api-strict-generate:
    path: ./cmd/api
    build: go build -o ./tmp/api ./cmd/api
    run: ./tmp/api
    pre: go generate ./...
    pre_strict: true

  # Protobuf generation before build.
  # Strict: a broken .proto means the generated Go code would be wrong.
  grpc-service:
    path: ./cmd/grpc
    build: go build -o ./tmp/grpc ./cmd/grpc
    run: ./tmp/grpc
    pre: protoc --go_out=. --go-grpc_out=. proto/service.proto
    pre_strict: true
    watch:
      - .go
      - .proto

  # Smoke test after restart.
  # Non-strict: a flaky test won't kill your dev loop. Note that post runs
  # before the swap, so this script validates the newly built binary without
  # network probing — use a --check flag or static analysis instead of curl.
  api-with-smoke:
    path: ./cmd/api
    build: go build -o ./tmp/api ./cmd/api
    run: ./tmp/api
    post: ./scripts/smoke-test.sh
    env:
      PORT: "8080"

  # Gate the swap with a health probe.
  # post runs before the swap, so a strict failure keeps the old process alive.
  api-health-gated:
    path: ./cmd/api
    build: go build -o ./tmp/api ./cmd/api
    run: ./tmp/api
    post: curl --silent --fail http://localhost:8080/healthz
    post_strict: true
    env:
      PORT: "8080"
